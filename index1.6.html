<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let data = localStorage.getItem("loopObj");
        if (data) {
            let obj = JSON.parse(data);
            
            Object.entries(obj).map(([key, value]) => {
                if (value === 9) {
                    console.log(value);
                }
            });
            let newObj = {};
            Object.entries(obj).map(([key, value]) => {
                if (value > 5) {
                    newObj[key] = value;
                }
            });
            console.log(newObj);
            localStorage.setItem("filteredObj", JSON.stringify(newObj));
        }
    </script
</body>
</html>
